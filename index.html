<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BhaiGPT 😂 - Real AI</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0A0A0A;
      color: #FFFFFF;
      height: 100vh;
      overflow: hidden;
    }

    .app { display: flex; height: 100vh; }

    /* Sidebar */
    .sidebar {
      width: 260px;
      background: #1F1F1F;
      border-right: 1px solid #333;
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 100;
    }

    .sidebar-header {
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #333;
    }

    .new-chat-btn {
      margin: 16px;
      padding: 12px 16px;
      background: #2A2A2A;
      border: 1px solid #444;
      border-radius: 8px;
      color: white;
      font-size: 15px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .chat-history {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .history-item {
      padding: 12px 16px;
      margin: 4px 8px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14.5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .history-item:hover, .history-item.active { background: #2A2A2A; }

    @media (max-width: 768px) {
      .sidebar { position: fixed; left: 0; top: 0; height: 100%; transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75); z-index: 90; display: none; }
      .overlay.show { display: block; }
    }

    /* Main Chat */
    .main-chat { flex: 1; display: flex; flex-direction: column; }

    .header {
      background: #1F1F1F;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #333;
    }

    .chat-box {
      flex: 1;
      padding: 30px 40px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 24px;
      background: #0A0A0A;
    }

    .message {
      max-width: 85%;
      padding: 16px 22px;
      border-radius: 18px;
      line-height: 1.65;
      font-size: 16px;
    }

    .bot { align-self: flex-start; background: #1F1F1F; border-bottom-left-radius: 6px; }
    .user { align-self: flex-end; background: linear-gradient(135deg, #10A37F, #0E8A6B); color: white; border-bottom-right-radius: 6px; }

    /* Code Block Styling */
    .code-block {
      background: #1E1E1E;
      border-radius: 12px;
      padding: 16px;
      margin: 12px 0;
      position: relative;
      max-width: 100%;
      overflow-x: auto;
    }

    .code-block pre {
      margin: 0;
      font-family: 'Courier New', monospace;
      font-size: 14.5px;
      line-height: 1.5;
    }

    .copy-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      background: #333;
      color: #fff;
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
    }

    .input-area {
      padding: 20px 40px 30px;
      background: #0F0F0F;
      border-top: 1px solid #333;
    }

    .input-wrapper {
      max-width: 780px;
      margin: 0 auto;
      position: relative;
      display: flex;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 18px 24px;
      border: 1px solid #444;
      border-radius: 9999px;
      background: #1F1F1F;
      color: white;
      font-size: 16.5px;
      outline: none;
    }

    button {
      background: #10A37F;
      color: white;
      border: none;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      font-size: 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .mic-btn {
      background: #ff4444;
    }

    .mic-btn.recording {
      background: #ff0000;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.12); }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body>

  <div class="app">
    <div class="overlay" id="overlay" onclick="closeSidebar()"></div>

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div style="font-size:20px;">😂 BhaiGPT</div>
        <span style="font-size:24px; cursor:pointer;" onclick="closeSidebar()">✕</span>
      </div>
      <div class="new-chat-btn" onclick="newChat()">+ Naya Chat</div>
      <div class="chat-history" id="chatHistory"></div>
    </div>

    <!-- Main Chat -->
    <div class="main-chat">
      <div class="header">
        <div style="display:flex; align-items:center; gap:12px;">
          <span style="font-size:28px; cursor:pointer;" onclick="toggleSidebar()">☰</span>
          <span id="chatTitle">BhaiGPT</span>
        </div>
        <div style="font-size:22px;">🤖</div>
      </div>

      <div class="chat-box" id="chatBox"></div>

      <div class="input-area">
        <div class="input-wrapper">
          <input type="text" id="userInput" placeholder="Bhai, kuch pooch na ya bol...">
          <button id="micBtn" class="mic-btn">🎤</button>
          <button id="sendBtn">↑</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-markup.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-css.min.js"></script>

  <script>
    let currentChatId = null;
    let chats = JSON.parse(localStorage.getItem('bhaigpt_chats')) || {};
    let recognition = null;
    let isRecording = false;

    const chatBox = document.getElementById('chatBox');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const micBtn = document.getElementById('micBtn');
    const chatHistory = document.getElementById('chatHistory');
    const chatTitleEl = document.getElementById('chatTitle');

    const GROQ_API_KEY = "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";   // ←←← APNI GROQ KEY YAHAN DAALO

    const SYSTEM_PROMPT = `Tu ek bahut mazedaar, desi, funny Hinglish AI hai. Naam hai BhaiGPT. 
    Har jawab mein thoda swag aur emoji daal. 
    Sirf tabhi "Behzad Arif" ka naam lena jab user specifically puche ki tujhe kisne banaya ho.`;

    // ==================== Voice Recognition ====================
    function initVoiceRecognition() {
      if ('SpeechRecognition' in window || 'webkitSpeechRecognition' in window) {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SpeechRecognition();
        recognition.lang = 'hi-IN';        // Hindi + English mix
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;

        recognition.onresult = (event) => {
          const transcript = event.results[0][0].transcript;
          userInput.value = transcript;
          sendMessage();                    // Auto send after speaking
        };

        recognition.onerror = (event) => {
          alert("Voice recognition mein error: " + event.error);
          stopRecording();
        };

        recognition.onend = () => stopRecording();
      } else {
        micBtn.style.display = 'none';
        console.log("Voice input is not supported in this browser");
      }
    }

    function toggleVoiceInput() {
      if (!recognition) return;

      if (isRecording) {
        stopRecording();
      } else {
        startRecording();
      }
    }

    function startRecording() {
      isRecording = true;
      micBtn.classList.add('recording');
      micBtn.textContent = "🔴";
      recognition.start();
    }

    function stopRecording() {
      isRecording = false;
      micBtn.classList.remove('recording');
      micBtn.textContent = "🎤";
      if (recognition) recognition.stop();
    }

    // ==================== Code Detection & Highlighting ====================
    function formatMessage(text, sender) {
      // Detect code blocks (```language ... ```)
      const codeRegex = /```(\w*)\n([\s\S]*?)```/g;
      let formattedText = text.replace(codeRegex, (match, language, code) => {
        const lang = language || 'javascript';
        return `
          <div class="code-block">
            <button class="copy-btn" onclick="copyCode(this)">Copy</button>
            <pre><code class="language-${lang}">${escapeHtml(code.trim())}</code></pre>
          </div>`;
      });

      const msgDiv = document.createElement('div');
      msgDiv.className = `message ${sender}`;
      msgDiv.innerHTML = formattedText.replace(/\n/g, '<br>');
      return msgDiv;
    }

    function escapeHtml(unsafe) {
      return unsafe.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    window.copyCode = function(btn) {
      const codeBlock = btn.parentElement.querySelector('code');
      const text = codeBlock.textContent;
      navigator.clipboard.writeText(text).then(() => {
        const original = btn.textContent;
        btn.textContent = "Copied!";
        setTimeout(() => btn.textContent = original, 2000);
      });
    };

    // ==================== Rest of the functions (same as before) ====================
    function saveChats() { localStorage.setItem('bhaigpt_chats', JSON.stringify(chats)); }

    function generateChatId() { return 'chat_' + Date.now(); }

    function createNewChat() {
      closeSidebar();
      const chatId = generateChatId();
      chats[chatId] = { title: "Naya Chat", messages: [] };
      currentChatId = chatId;
      saveChats();
      renderHistory();
      loadChat(chatId);
    }

    function loadChat(chatId) {
      closeSidebar();
      currentChatId = chatId;
      chatBox.innerHTML = '';
      const chat = chats[chatId];
      chatTitleEl.textContent = chat.title || "BhaiGPT";

      chat.messages.forEach(msg => {
        const msgDiv = formatMessage(msg.text, msg.sender);
        chatBox.appendChild(msgDiv);
      });
      chatBox.scrollTop = chatBox.scrollHeight;
      renderHistory();
    }

    function addMessage(text, sender, save = true, isNewReply = false) {
      const msgDiv = formatMessage(text, sender);
      chatBox.appendChild(msgDiv);
      chatBox.scrollTop = chatBox.scrollHeight;

      if (save && currentChatId) {
        chats[currentChatId].messages.push({ text, sender });
        saveChats();

        if (chats[currentChatId].messages.length === 1 && sender === 'user') {
          chats[currentChatId].title = text.substring(0, 35) + (text.length > 35 ? '...' : '');
          chatTitleEl.textContent = chats[currentChatId].title;
          saveChats();
          renderHistory();
        }
      }
    }

    function showTyping() {
      const typing = document.createElement('div');
      typing.id = 'typingIndicator';
      typing.className = 'message bot';
      typing.textContent = "Bhai soch raha hoon...";
      chatBox.appendChild(typing);
      chatBox.scrollTop = chatBox.scrollHeight;
      return typing;
    }

    async function sendToGroq(userMessage) {
      try {
        const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
          method: "POST",
          headers: { 
            "Authorization": `Bearer ${GROQ_API_KEY}`, 
            "Content-Type": "application/json" 
          },
          body: JSON.stringify({
            model: "llama-3.3-70b-versatile",
            messages: [
              { role: "system", content: SYSTEM_PROMPT },
              { role: "user", content: userMessage }
            ],
            temperature: 0.9,
            max_tokens: 900
          })
        });

        if (!res.ok) throw new Error();
        const data = await res.json();
        return data.choices[0].message.content;
      } catch (e) {
        return "Arre bhai, API mein dikkat aa rahi hai 😅";
      }
    }

    async function sendMessage() {
      const text = userInput.value.trim();
      if (!text || !currentChatId) return;

      addMessage(text, 'user');
      userInput.value = "";

      const typingIndicator = showTyping();
      const reply = await sendToGroq(text);
      if (typingIndicator.parentNode) typingIndicator.parentNode.removeChild(typingIndicator);

      addMessage(reply, 'bot', true, true);
    }

    function renderHistory() { /* ... same as previous version ... */ 
      // (Maintaining same history logic for brevity - copy from previous code if needed)
      chatHistory.innerHTML = '';
      Object.keys(chats).sort().reverse().forEach(chatId => {
        const chat = chats[chatId];
        const item = document.createElement('div');
        item.className = `history-item ${chatId === currentChatId ? 'active' : ''}`;
        item.textContent = chat.title;
        item.onclick = () => loadChat(chatId);
        chatHistory.appendChild(item);
      });
    }

    function newChat() { createNewChat(); }
    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
      document.getElementById('overlay').classList.toggle('show');
    }
    function closeSidebar() {
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('overlay').classList.remove('show');
    }

    // Event Listeners
    sendBtn.addEventListener('click', sendMessage);
    userInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });
    micBtn.addEventListener('click', toggleVoiceInput);

    // Initialize
    window.onload = () => {
      initVoiceRecognition();
      if (Object.keys(chats).length === 0) {
        createNewChat();
      } else {
        const latest = Object.keys(chats).sort().reverse()[0];
        loadChat(latest);
      }
      renderHistory();
      userInput.focus();
    };
  </script>
</body>
</html>
