<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BhaiGPT 😂 - Real AI</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0A0A0A;
      color: #FFFFFF;
      height: 100vh;
      overflow: hidden;
    }

    .app {
      display: flex;
      height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      width: 260px;
      background: #1F1F1F;
      border-right: 1px solid #333;
      display: flex;
      flex-direction: column;
      position: relative;
      transition: transform 0.3s ease;
      z-index: 100;
    }

    .sidebar-header {
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #333;
    }

    .new-chat-btn {
      margin: 16px;
      padding: 12px 16px;
      background: #2A2A2A;
      border: 1px solid #444;
      border-radius: 8px;
      color: white;
      font-size: 15px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .new-chat-btn:hover { background: #3A3A3A; }

    .chat-history {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .history-item {
      padding: 12px 16px;
      margin: 4px 8px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14.5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: 0.2s;
    }

    .history-item:hover, .history-item.active {
      background: #2A2A2A;
    }

    /* Mobile Sidebar Fixes */
    @media (max-width: 768px) {
      .sidebar {
        position: fixed;
        left: 0;
        top: 0;
        height: 100%;
        transform: translateX(-100%);
      }
      .sidebar.open {
        transform: translateX(0);
      }
      .overlay {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(0,0,0,0.7);
        z-index: 90;
        display: none;
      }
      .overlay.show { display: block; }
    }

    /* Main Chat */
    .main-chat {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: #1F1F1F;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #333;
      font-weight: 600;
    }

    .chat-box {
      flex: 1;
      padding: 30px 40px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 24px;
      background: #0A0A0A;
    }

    .message {
      max-width: 78%;
      padding: 16px 22px;
      border-radius: 18px;
      line-height: 1.6;
      font-size: 16px;
    }

    .bot { align-self: flex-start; background: #1F1F1F; border-bottom-left-radius: 6px; }
    .user { align-self: flex-end; background: linear-gradient(135deg, #10A37F, #0E8A6B); color: white; border-bottom-right-radius: 6px; }

    .input-area {
      padding: 20px 40px 30px;
      background: #0F0F0F;
      border-top: 1px solid #333;
    }

    .input-wrapper {
      max-width: 780px;
      margin: 0 auto;
      position: relative;
    }

    input {
      width: 100%;
      padding: 18px 24px;
      padding-right: 70px;
      border: 1px solid #444;
      border-radius: 9999px;
      background: #1F1F1F;
      color: white;
      font-size: 16.5px;
      outline: none;
    }

    button {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      background: #10A37F;
      color: white;
      border: none;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      font-size: 22px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="app">
    <!-- Overlay for mobile -->
    <div class="overlay" id="overlay" onclick="closeSidebar()"></div>

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div style="font-size:20px;">😂 BhaiGPT</div>
        <span style="font-size:24px; cursor:pointer;" onclick="closeSidebar()">✕</span>
      </div>

      <div class="new-chat-btn" onclick="newChat()">
        <span>+</span> Naya Chat
      </div>

      <div class="chat-history" id="chatHistory"></div>
    </div>

    <!-- Main Chat -->
    <div class="main-chat">
      <div class="header">
        <div style="display:flex; align-items:center; gap:12px;">
          <span style="font-size:28px; cursor:pointer;" onclick="toggleSidebar()">☰</span>
          <span id="chatTitle">BhaiGPT</span>
        </div>
        <div style="font-size:22px;">🤖</div>
      </div>

      <div class="chat-box" id="chatBox"></div>

      <div class="input-area">
        <div class="input-wrapper">
          <input type="text" id="userInput" placeholder="Bhai, kuch pooch na...">
          <button id="sendBtn">↑</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    let currentChatId = null;
    let chats = JSON.parse(localStorage.getItem('bhaigpt_chats')) || {};

    const chatBox = document.getElementById('chatBox');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const chatHistory = document.getElementById('chatHistory');
    const chatTitleEl = document.getElementById('chatTitle');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');

    const GROQ_API_KEY = "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";   // ←←← APNI GROQ KEY YAHAN DAALO

    const API_URL = "https://api.groq.com/openai/v1/chat/completions";

    const SYSTEM_PROMPT = `Tu ek bahut mazedaar, desi, funny Hinglish AI hai. Naam hai BhaiGPT. 
    Har jawab mein thoda swag, masti aur emoji daal. 
    Agar koi puche ki tujhe kisne banaya, who created you etc. toh bolna: "Mujhe banaya hai Behzad Arif ne ❤️".`;

    function saveChats() {
      localStorage.setItem('bhaigpt_chats', JSON.stringify(chats));
    }

    function generateChatId() {
      return 'chat_' + Date.now();
    }

    function createNewChat() {
      closeSidebar();
      const chatId = generateChatId();
      chats[chatId] = { title: "Naya Chat", messages: [] };
      currentChatId = chatId;
      saveChats();
      renderHistory();
      loadChat(chatId);
    }

    function loadChat(chatId) {
      closeSidebar();
      currentChatId = chatId;
      chatBox.innerHTML = '';
      const chat = chats[chatId];
      chatTitleEl.textContent = chat.title || "BhaiGPT";

      chat.messages.forEach(msg => {
        addMessage(msg.text, msg.sender, false);
      });
      renderHistory();
    }

    function addMessage(text, sender, save = true) {
      const msgDiv = document.createElement('div');
      msgDiv.className = `message ${sender}`;
      msgDiv.innerHTML = text.replace(/\n/g, '<br>');
      chatBox.appendChild(msgDiv);
      chatBox.scrollTop = chatBox.scrollHeight;

      if (save && currentChatId) {
        chats[currentChatId].messages.push({ text, sender });
        saveChats();

        if (chats[currentChatId].messages.length === 1 && sender === 'user') {
          chats[currentChatId].title = text.substring(0, 35) + (text.length > 35 ? '...' : '');
          chatTitleEl.textContent = chats[currentChatId].title;
          saveChats();
          renderHistory();
        }
      }
    }

    function showTyping() {
      const typing = document.createElement('div');
      typing.id = 'typingIndicator';
      typing.className = 'message bot';
      typing.textContent = "Bhai soch raha hoon...";
      chatBox.appendChild(typing);
      chatBox.scrollTop = chatBox.scrollHeight;
      return typing;
    }

    async function sendToGroq(userMessage) {
      try {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: { "Authorization": `Bearer ${GROQ_API_KEY}`, "Content-Type": "application/json" },
          body: JSON.stringify({
            model: "llama-3.3-70b-versatile",
            messages: [{ role: "system", content: SYSTEM_PROMPT }, { role: "user", content: userMessage }],
            temperature: 0.9,
            max_tokens: 800
          })
        });
        if (!res.ok) throw new Error();
        const data = await res.json();
        return data.choices[0].message.content;
      } catch (e) {
        return "Arre bhai, API mein dikkat aa rahi hai 😅";
      }
    }

    async function sendMessage() {
      const text = userInput.value.trim();
      if (!text || !currentChatId) return;

      addMessage(text, 'user');
      userInput.value = "";

      const typing = showTyping();
      const reply = await sendToGroq(text);
      if (typing.parentNode) typing.parentNode.removeChild(typing);
      addMessage(reply, 'bot');
    }

    function renderHistory() {
      chatHistory.innerHTML = '';
      Object.keys(chats).sort().reverse().forEach(chatId => {
        const chat = chats[chatId];
        const item = document.createElement('div');
        item.className = `history-item ${chatId === currentChatId ? 'active' : ''}`;
        item.textContent = chat.title;
        
        // Rename on long press (mobile) or right click (desktop)
        item.addEventListener('contextmenu', (e) => {
          e.preventDefault();
          renameChat(chatId);
        });
        item.addEventListener('touchstart', () => {
          item.longPressTimer = setTimeout(() => renameChat(chatId), 600);
        });
        item.addEventListener('touchend', () => clearTimeout(item.longPressTimer));
        
        item.onclick = () => loadChat(chatId);
        chatHistory.appendChild(item);
      });
    }

    function renameChat(chatId) {
      const newTitle = prompt("Naya title daalo:", chats[chatId].title);
      if (newTitle && newTitle.trim() !== "") {
        chats[chatId].title = newTitle.trim();
        saveChats();
        renderHistory();
        if (currentChatId === chatId) {
          chatTitleEl.textContent = newTitle.trim();
        }
      }
    }

    function newChat() {
      createNewChat();
    }

    function toggleSidebar() {
      sidebar.classList.toggle('open');
      overlay.classList.toggle('show');
    }

    function closeSidebar() {
      sidebar.classList.remove('open');
      overlay.classList.remove('show');
    }

    // Event Listeners
    sendBtn.addEventListener('click', sendMessage);
    userInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });

    // Initialize
    window.onload = () => {
      if (Object.keys(chats).length === 0) {
        createNewChat();
      } else {
        const latestChatId = Object.keys(chats).sort().reverse()[0];
        loadChat(latestChatId);
      }
      renderHistory();
      userInput.focus();
    };
  </script>
</body>
</html>
